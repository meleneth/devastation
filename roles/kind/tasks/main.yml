---
- name: Check kind binary
  ansible.builtin.stat:
    path: /usr/local/bin/kind
  register: kind_binary

- name: Install kind when missing
  ansible.builtin.get_url:
    url: "https://kind.sigs.k8s.io/dl/{{ kind_version }}/kind-linux-amd64"
    dest: /usr/local/bin/kind
    mode: "0755"
  when: not kind_binary.stat.exists

- name: Check kubectl binary
  ansible.builtin.stat:
    path: /usr/local/bin/kubectl
  register: kubectl_binary

- name: Install kubectl when missing
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: "0755"
  when: not kubectl_binary.stat.exists

- name: Create KIND config directory
  ansible.builtin.file:
    path: "{{ devastation_paths.kind }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write KIND cluster config
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/kind-config.yml.j2"
    dest: "{{ devastation_paths.kind }}/kind-config.yml"
    owner: root
    group: root
    mode: "0644"

- name: Check for existing KIND cluster
  ansible.builtin.command: "kind get clusters"
  register: kind_clusters
  changed_when: false

- name: Create KIND cluster
  ansible.builtin.command: "kind create cluster --name {{ kind_cluster_name }} --config {{ devastation_paths.kind }}/kind-config.yml --image {{ kind_node_image }}"
  when: "kind_cluster_name not in kind_clusters.stdout_lines"

- name: Get KIND nodes
  ansible.builtin.command: "kind get nodes --name {{ kind_cluster_name }}"
  register: kind_nodes
  changed_when: false

- name: Connect KIND nodes to devastation network
  ansible.builtin.command: "docker network connect devastation {{ item }}"
  loop: "{{ kind_nodes.stdout_lines }}"
  register: kind_network_connect
  changed_when: kind_network_connect.rc == 0
  failed_when:
    - kind_network_connect.rc != 0
    - "'already exists' not in kind_network_connect.stderr"

- name: Configure registry trust inside KIND nodes
  ansible.builtin.shell: |
    set -eu
    node="{{ item }}"
    docker exec "$node" mkdir -p /etc/containerd/certs.d/registry.{{ devastation_domain }}
    docker cp {{ devastation_paths.ca }}/root-ca.crt "$node":/etc/containerd/certs.d/registry.{{ devastation_domain }}/ca.crt
    docker exec "$node" sh -c 'printf "%s\n" \
      "server = \"https://registry.{{ devastation_domain }}\"" \
      "" \
      "[host.\"https://registry.{{ devastation_domain }}\"]" \
      "  capabilities = [\"pull\", \"resolve\"]" \
      "  ca = \"/etc/containerd/certs.d/registry.{{ devastation_domain }}/ca.crt\"" \
      > /etc/containerd/certs.d/registry.{{ devastation_domain }}/hosts.toml'
    docker exec "$node" systemctl restart containerd
  loop: "{{ kind_nodes.stdout_lines }}"
  changed_when: true

- name: Add Helm repository for cert-manager
  ansible.builtin.command:
    argv:
      - helm
      - repo
      - add
      - jetstack
      - "{{ cert_manager_helm_repo }}"
      - --force-update
  changed_when: true
  when: kind_install_platform_addons | bool

- name: Add Helm repository for Istio
  ansible.builtin.command:
    argv:
      - helm
      - repo
      - add
      - istio
      - "{{ istio_helm_repo }}"
      - --force-update
  changed_when: true
  when: kind_install_platform_addons | bool

- name: Refresh Helm repositories
  ansible.builtin.command:
    argv:
      - helm
      - repo
      - update
  changed_when: true
  when: kind_install_platform_addons | bool

- name: Install cert-manager for operator webhooks
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - --install
      - cert-manager
      - jetstack/cert-manager
      - --namespace
      - cert-manager
      - --create-namespace
      - --set
      - crds.enabled=true
      - --wait
      - --timeout
      - 5m
  changed_when: true
  when: kind_install_platform_addons | bool

- name: Install Istio base chart
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - --install
      - istio-base
      - istio/base
      - --version
      - "{{ istio_version }}"
      - --namespace
      - istio-system
      - --create-namespace
      - --wait
      - --timeout
      - 5m
  changed_when: true
  when: kind_install_platform_addons | bool

- name: Install Istio control plane
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - --install
      - istiod
      - istio/istiod
      - --version
      - "{{ istio_version }}"
      - --namespace
      - istio-system
      - --wait
      - --timeout
      - 10m
  changed_when: true
  when: kind_install_platform_addons | bool

- name: Ensure Argo CD namespace exists
  ansible.builtin.command:
    argv:
      - kubectl
      - create
      - namespace
      - argocd
  register: argocd_namespace
  changed_when: argocd_namespace.rc == 0
  failed_when:
    - argocd_namespace.rc != 0
    - "'AlreadyExists' not in argocd_namespace.stderr"
  when: kind_install_platform_addons | bool

- name: Install Argo CD
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - -n
      - argocd
      - --server-side
      - --force-conflicts
      - -f
      - "{{ argocd_manifest_url }}"
  changed_when: true
  when: kind_install_platform_addons | bool

- name: Install OpenTelemetry Operator
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - --server-side
      - --force-conflicts
      - -f
      - "{{ otel_operator_manifest_url }}"
  changed_when: true
  when: kind_install_platform_addons | bool

- name: Wait for Istio control plane
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - istio-system
      - rollout
      - status
      - deployment/istiod
      - --timeout=300s
  changed_when: false
  when: kind_install_platform_addons | bool

- name: Wait for Argo CD API server
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - argocd
      - rollout
      - status
      - deployment/argocd-server
      - --timeout=300s
  changed_when: false
  when: kind_install_platform_addons | bool

- name: Wait for OpenTelemetry Operator
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - opentelemetry-operator-system
      - rollout
      - status
      - deployment/opentelemetry-operator-controller-manager
      - --timeout=300s
  changed_when: false
  when: kind_install_platform_addons | bool
