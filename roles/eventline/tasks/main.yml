---
- name: Create eventline data directory
  ansible.builtin.file:
    path: "{{ devastation_paths.eventline }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Start eventline GoAWS service
  community.docker.docker_compose_v2:
    project_src: "{{ devastation_paths.compose }}"
    services:
      - eventline
    state: present
