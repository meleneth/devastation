---
- name: Install language toolchain build dependencies
  ansible.builtin.apt:
    name:
      - autoconf
      - bison
      - libbz2-dev
      - libffi-dev
      - libgdbm-dev
      - libgdbm-compat-dev
      - liblzma-dev
      - libncurses-dev
      - libreadline-dev
      - libsqlite3-dev
      - libssl-dev
      - libyaml-dev
      - llvm
      - tk-dev
      - uuid-dev
      - zlib1g-dev
    state: present

- name: Clone pyenv for target user
  ansible.builtin.git:
    repo: "{{ pyenv_repo }}"
    dest: "{{ pyenv_root }}"
    version: master
    recursive: false
    update: false
  become: true
  become_user: "{{ devastation_user }}"

- name: Clone rbenv for target user
  ansible.builtin.git:
    repo: "{{ rbenv_repo }}"
    dest: "{{ rbenv_root }}"
    version: master
    recursive: false
    update: false
  become: true
  become_user: "{{ devastation_user }}"

- name: Ensure rbenv plugins directory exists
  ansible.builtin.file:
    path: "{{ rbenv_root }}/plugins"
    state: directory
    owner: "{{ devastation_user }}"
    group: "{{ devastation_user }}"
    mode: "0755"

- name: Clone ruby-build plugin for rbenv
  ansible.builtin.git:
    repo: "{{ ruby_build_repo }}"
    dest: "{{ rbenv_root }}/plugins/ruby-build"
    version: master
    recursive: false
    update: false
  become: true
  become_user: "{{ devastation_user }}"

- name: Check for failed nvm test fixture submodule
  ansible.builtin.stat:
    path: "{{ nvm_root }}/test/fixtures/nvmrc/.git"
  register: nvm_failed_submodule

- name: Remove failed nvm test fixture submodule directory
  ansible.builtin.file:
    path: "{{ nvm_root }}/test/fixtures/nvmrc"
    state: absent
  when: nvm_failed_submodule.stat.exists

- name: Clone nvm for target user
  ansible.builtin.git:
    repo: "{{ nvm_repo }}"
    dest: "{{ nvm_root }}"
    version: "{{ nvm_version }}"
    recursive: false
    update: false
  become: true
  become_user: "{{ devastation_user }}"

- name: Add pyenv initialization to profile
  ansible.builtin.blockinfile:
    path: "{{ user_setup_shell_profile }}"
    create: true
    owner: "{{ devastation_user }}"
    group: "{{ devastation_user }}"
    mode: "0644"
    marker: "# {mark} DEVASTATION PYENV"
    block: |
      export PYENV_ROOT="$HOME/.pyenv"
      if [ -d "$PYENV_ROOT/bin" ]; then
        export PATH="$PYENV_ROOT/bin:$PATH"
        eval "$(pyenv init -)"
      fi

- name: Add rbenv initialization to profile
  ansible.builtin.blockinfile:
    path: "{{ user_setup_shell_profile }}"
    create: true
    owner: "{{ devastation_user }}"
    group: "{{ devastation_user }}"
    mode: "0644"
    marker: "# {mark} DEVASTATION RBENV"
    block: |
      export RBENV_ROOT="$HOME/.rbenv"
      if [ -d "$RBENV_ROOT/bin" ]; then
        export PATH="$RBENV_ROOT/bin:$PATH"
        eval "$(rbenv init -)"
      fi

- name: Add nvm initialization to profile
  ansible.builtin.blockinfile:
    path: "{{ user_setup_shell_profile }}"
    create: true
    owner: "{{ devastation_user }}"
    group: "{{ devastation_user }}"
    mode: "0644"
    marker: "# {mark} DEVASTATION NVM"
    block: |
      export NVM_DIR="$HOME/.nvm"
      if [ -s "$NVM_DIR/nvm.sh" ]; then
        . "$NVM_DIR/nvm.sh"
      fi
