---
- name: Create certificate directory for {{ cert_name }}
  ansible.builtin.file:
    path: "{{ devastation_paths.certs }}/{{ cert_name }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write OpenSSL CSR config for {{ cert_name }}
  ansible.builtin.template:
    src: openssl-san.cnf.j2
    dest: "{{ devastation_paths.certs }}/{{ cert_name }}/openssl.cnf"
    owner: root
    group: root
    mode: "0644"
  vars:
    certificate_name: "{{ cert_name }}"

- name: Generate private key for {{ cert_name }}
  ansible.builtin.command:
    cmd: "openssl genrsa -out {{ devastation_paths.certs }}/{{ cert_name }}/tls.key 2048"
    creates: "{{ devastation_paths.certs }}/{{ cert_name }}/tls.key"

- name: Protect private key for {{ cert_name }}
  ansible.builtin.file:
    path: "{{ devastation_paths.certs }}/{{ cert_name }}/tls.key"
    owner: root
    group: root
    mode: "0600"

- name: Generate CSR for {{ cert_name }}
  ansible.builtin.command:
    cmd: >-
      openssl req -new -key {{ devastation_paths.certs }}/{{ cert_name }}/tls.key
      -out {{ devastation_paths.certs }}/{{ cert_name }}/tls.csr
      -config {{ devastation_paths.certs }}/{{ cert_name }}/openssl.cnf
    creates: "{{ devastation_paths.certs }}/{{ cert_name }}/tls.csr"

- name: Sign certificate for {{ cert_name }}
  ansible.builtin.command:
    cmd: >-
      openssl x509 -req
      -in {{ devastation_paths.certs }}/{{ cert_name }}/tls.csr
      -CA {{ devastation_paths.ca }}/root-ca.crt
      -CAkey {{ devastation_paths.ca }}/root-ca.key
      -CAcreateserial
      -out {{ devastation_paths.certs }}/{{ cert_name }}/tls.crt
      -days {{ cert_valid_days }}
      -sha256
      -extensions req_ext
      -extfile {{ devastation_paths.certs }}/{{ cert_name }}/openssl.cnf
    creates: "{{ devastation_paths.certs }}/{{ cert_name }}/tls.crt"
