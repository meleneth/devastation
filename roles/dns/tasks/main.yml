---
- name: Create DNS directory
  ansible.builtin.file:
    path: "{{ devastation_paths.dns }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write CoreDNS Corefile
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/Corefile.j2"
    dest: "{{ devastation_paths.dns }}/Corefile"
    owner: root
    group: root
    mode: "0644"

- name: Write shared Docker Compose file
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/compose.yml.j2"
    dest: "{{ devastation_paths.compose }}/compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Start DNS service
  community.docker.docker_compose_v2:
    project_src: "{{ devastation_paths.compose }}"
    services:
      - dns
    state: present

- name: Add static deva.station names to host file
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} DEVASTATION DEVA.STATION HOSTS"
    block: |
      {% for record in devastation_dns_records %}
      {{ record.ip }} {{ record.name }}
      {% endfor %}
  when: dns_configure_hosts_file

- name: Gather service facts for resolver configuration
  ansible.builtin.service_facts:
  when: dns_configure_host_resolver

- name: Ensure systemd-resolved drop-in directory exists
  ansible.builtin.file:
    path: "{{ dns_systemd_resolved_dropin | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - dns_configure_host_resolver
    - "'systemd-resolved.service' in ansible_facts.services"

- name: Configure host resolver for deva.station
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/systemd-resolved-devastation.conf.j2"
    dest: "{{ dns_systemd_resolved_dropin }}"
    owner: root
    group: root
    mode: "0644"
  when:
    - dns_configure_host_resolver
    - "'systemd-resolved.service' in ansible_facts.services"
  notify: Restart systemd-resolved

- name: Explain skipped systemd-resolved configuration
  ansible.builtin.debug:
    msg: "systemd-resolved is not available; /etc/hosts provides host resolution for deva.station names."
  when:
    - dns_configure_host_resolver
    - "'systemd-resolved.service' not in ansible_facts.services"
