---
devastation_domain: deva.station
devastation_root: /srv/devastation
devastation_user: "{{ lookup('env', 'USER') | default(ansible_user_id, true) }}"

devastation_subnets:
  services: 172.30.42.0/24
  service_gateway: 172.30.42.1
  dns: 172.30.42.10
  ca: 172.30.42.11
  registry: 172.30.42.12
  apt_cache: 172.30.42.13
  gitlab: 172.30.42.14
  runner: 172.30.42.15
  registry_cache: 172.30.42.16
  otel_collector: 172.30.42.17
  prometheus: 172.30.42.18
  jaeger: 172.30.42.19
  kind: 172.30.42.20
  grafana: 172.30.42.21
  loki: 172.30.42.22
  node_exporter: 172.30.42.23
  cadvisor: 172.30.42.24
  vault: 172.30.42.25
  eventline: 172.30.42.26
  storage: 172.30.42.27
  www: 172.30.42.35
  test_db: 172.30.42.31
  development_db: 172.30.42.32
  production_db: 172.30.42.33
  otel_db: 172.30.42.34

devastation_dns_records:
  - name: "dns.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.dns }}"
  - name: "ca.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.ca }}"
  - name: "registry.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.registry }}"
  - name: "registry-cache.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.registry_cache }}"
  - name: "apt-cache.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.apt_cache }}"
  - name: "gitlab.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.gitlab }}"
  - name: "runner.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.runner }}"
  - name: "kind.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.kind }}"
  - name: "otel-collector.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.otel_collector }}"
  - name: "grafana.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.grafana }}"
  - name: "jaeger.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.jaeger }}"
  - name: "prometheus.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.prometheus }}"
  - name: "loki.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.loki }}"
  - name: "node-exporter.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.node_exporter }}"
  - name: "cadvisor.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.cadvisor }}"
  - name: "vault.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.vault }}"
  - name: "eventline.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.eventline }}"
  - name: "storage.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.storage }}"
  - name: "www.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.www }}"
  - name: "test-db.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.test_db }}"
  - name: "development-db.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.development_db }}"
  - name: "production-db.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.production_db }}"
  - name: "otel-db.{{ devastation_domain }}"
    ip: "{{ devastation_subnets.otel_db }}"

devastation_internal_hostnames:
  - "dns.{{ devastation_domain }}"
  - "ca.{{ devastation_domain }}"
  - "registry.{{ devastation_domain }}"
  - "registry-cache.{{ devastation_domain }}"
  - "apt-cache.{{ devastation_domain }}"
  - "gitlab.{{ devastation_domain }}"
  - "runner.{{ devastation_domain }}"
  - "kind.{{ devastation_domain }}"
  - "otel-collector.{{ devastation_domain }}"
  - "grafana.{{ devastation_domain }}"
  - "jaeger.{{ devastation_domain }}"
  - "prometheus.{{ devastation_domain }}"
  - "loki.{{ devastation_domain }}"
  - "node-exporter.{{ devastation_domain }}"
  - "cadvisor.{{ devastation_domain }}"
  - "vault.{{ devastation_domain }}"
  - "eventline.{{ devastation_domain }}"
  - "storage.{{ devastation_domain }}"
  - "www.{{ devastation_domain }}"
  - "test-db.{{ devastation_domain }}"
  - "development-db.{{ devastation_domain }}"
  - "production-db.{{ devastation_domain }}"
  - "otel-db.{{ devastation_domain }}"

devastation_paths:
  certs: "{{ devastation_root }}/certs"
  ca: "{{ devastation_root }}/ca"
  secrets: "{{ devastation_root }}/secrets"
  compose: "{{ devastation_root }}/compose"
  dns: "{{ devastation_root }}/dns"
  registry: "{{ devastation_root }}/registry"
  apt_cache: "{{ devastation_root }}/apt-cache"
  kind: "{{ devastation_root }}/kind"
  gitlab: "{{ devastation_root }}/gitlab"
  gitlab_runner: "{{ devastation_root }}/gitlab-runner"
  observability: "{{ devastation_root }}/observability"
  vault: "{{ devastation_root }}/vault"
  eventline: "{{ devastation_root }}/eventline"
  storage: "{{ devastation_root }}/storage"
  www: "{{ devastation_root }}/www"
  postgres: "{{ devastation_root }}/postgres"
  logs: "{{ devastation_root }}/logs"

base_packages_extra: []
apt_lock_timeout: 300
base_packages_default:
  - apt-transport-https
  - bash
  - build-essential
  - ca-certificates
  - conntrack
  - coreutils
  - curl
  - dnsutils
  - fd-find
  - git
  - gnupg
  - iproute2
  - jq
  - make
  - netcat-openbsd
  - openssl
  - pipx
  - python3
  - python3-pip
  - python3-venv
  - ripgrep
  - rsync
  - socat
  - sudo
  - unzip
  - wget
  - yq

user_setup_enabled: true
user_setup_home: "{{ lookup('ansible.builtin.env', 'HOME') }}"
user_setup_shell_profile: "{{ user_setup_home }}/.profile"
pyenv_repo: https://github.com/pyenv/pyenv.git
pyenv_root: "{{ user_setup_home }}/.pyenv"
rbenv_repo: https://github.com/rbenv/rbenv.git
rbenv_root: "{{ user_setup_home }}/.rbenv"
ruby_build_repo: https://github.com/rbenv/ruby-build.git
nvm_repo: https://github.com/nvm-sh/nvm.git
nvm_version: v0.40.1
nvm_root: "{{ user_setup_home }}/.nvm"

meslo_lgs_nerd_font_enabled: true
meslo_lgs_nerd_font_base_url: https://raw.githubusercontent.com/romkatv/powerlevel10k-media/master
meslo_lgs_nerd_font_dir: /usr/local/share/fonts/devastation/MesloLGS
meslo_lgs_nerd_font_files:
  - MesloLGS NF Regular.ttf
  - MesloLGS NF Bold.ttf
  - MesloLGS NF Italic.ttf
  - MesloLGS NF Bold Italic.ttf

install_nodejs_from_distro: true
install_docker_engine: true
docker_users:
  - "{{ devastation_user }}"
docker_daemon_dns: "{{ devastation_subnets.dns }}"
docker_insecure_registry_fallback: false

neovim_create_config_if_missing: true
neovim_config_dir: "{{ lookup('env', 'HOME') }}/.config/nvim"
neovim_install_distro_package: false
neovim_remove_distro_package: true
neovim_official_release_url: https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz
neovim_official_archive: /tmp/devastation-nvim-linux-x86_64.tar.gz
neovim_install_root: /opt
neovim_extracted_dir: /opt/nvim-linux-x86_64
neovim_binary_path: /usr/local/bin/nvim
neovim_force_official_download: false
lazyvim_enabled: true
lazyvim_starter_repo: https://github.com/LazyVim/starter.git
lazyvim_starter_version: main

dns_upstream_resolvers:
  - 1.1.1.1
  - 9.9.9.9
dns_configure_hosts_file: true
dns_configure_host_resolver: true
dns_systemd_resolved_dropin: /etc/systemd/resolved.conf.d/devastation.conf

ca_install_host_trust: true
ca_install_browser_nss_trust: true
ca_nss_cert_name: "Devastation Local Root CA"
ca_browser_nss_db_paths:
  - "{{ user_setup_home }}/.local/share/pki/nssdb"
  - "{{ user_setup_home }}/.pki/nssdb"
ca_common_name: "Devastation Local Root CA"
ca_ephemeral_root: true
ca_force_rotate: false
ca_rotation_script: /usr/local/bin/devastation-rotate-trust-universe
ca_leaf_certificates:
  - "registry.{{ devastation_domain }}"
  - "gitlab.{{ devastation_domain }}"
  - "ca.{{ devastation_domain }}"
  - "apt-cache.{{ devastation_domain }}"
  - "kind.{{ devastation_domain }}"
cert_subject_country: US
cert_valid_days: 825

registry_enable_auth: false
registry_htpasswd_user: devastation
registry_pull_through_cache_enabled: true
registry_pull_through_remoteurl: https://registry-1.docker.io
registry_metrics_port: 5001

apt_cache_port: 3142
apt_cache_configure_host: true
apt_cache_prefetch_packages:
  - git
  - curl
  - ca-certificates
  - build-essential
  - python3
  - python3-venv
  - jq
  - ripgrep
apt_cache_prefetch_images:
  - debian:bookworm-slim
  - ubuntu:24.04
  - alpine:3.20
  - kindest/node:v1.30.0

kind_cluster_name: devastation
kind_version: v0.23.0
kubectl_version: v1.30.2
kind_node_image: kindest/node:v1.30.0
kind_api_port: 6443
helm_version: v4.2.0
k9s_version: v0.50.18
lazydocker_version: 0.25.0
trivy_version: 0.70.0
istio_version: 1.30.0
argocd_version: v3.4.2
otel_operator_version: v0.151.0
kind_install_platform_addons: true
cert_manager_helm_repo: https://charts.jetstack.io
istio_helm_repo: https://istio-release.storage.googleapis.com/charts
argocd_manifest_url: "https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml"
otel_operator_manifest_url: "https://github.com/open-telemetry/opentelemetry-operator/releases/download/{{ otel_operator_version }}/opentelemetry-operator.yaml"

gitlab_version: "17.1.1-ce.0"
gitlab_hostname: "gitlab.{{ devastation_domain }}"
gitlab_external_url: "https://{{ gitlab_hostname }}"
gitlab_ssh_port: 2222
gitlab_http_port: 8080
gitlab_https_port: 8443
gitlab_allow_existing_data: false
gitlab_migration_enabled: false
gitlab_backup_tar: ""
gitlab_old_config_path: ""
gitlab_old_logs_path: ""
gitlab_old_data_path: ""

gitlab_runner_version: "alpine-v17.1.0"
gitlab_runner_authentication_token: ""
gitlab_runner_registration_token: ""
gitlab_runner_executor: docker
gitlab_runner_docker_image: docker:27
gitlab_runner_mount_docker_socket: false
gitlab_runner_tags: "local,devastation,docker"

postgres_version: "18.4"
postgres_default_user: devastation
postgres_default_password: devastation
postgres_databases:
  - service: test-db
    hostname: "test-db.{{ devastation_domain }}"
    subnet_key: test_db
    database: test_db
    host_port: 5433
  - service: development-db
    hostname: "development-db.{{ devastation_domain }}"
    subnet_key: development_db
    database: development_db
    host_port: 5434
  - service: production-db
    hostname: "production-db.{{ devastation_domain }}"
    subnet_key: production_db
    database: production_db
    host_port: 5435
  - service: otel-db
    hostname: "otel-db.{{ devastation_domain }}"
    subnet_key: otel_db
    database: otel_db
    host_port: 5436

vault_version: "1.19.5"
vault_dev_root_token: devastation
vault_port: 8200
goaws_image: admiralpiett/goaws:v0.5.4
goaws_port: 4100
minio_image: minio/minio:RELEASE.2025-04-22T22-12-26Z
minio_root_user: devastation
minio_root_password: devastation
minio_api_port: 9000
minio_console_port: 9001
www_image: nginx:1.27-alpine
www_port: 80

grafana_image: grafana/grafana-enterprise:latest
grafana_admin_user: admin
grafana_admin_password: devastation
grafana_port: 3000
prometheus_image: prom/prometheus:latest
prometheus_port: 9090
prometheus_retention: 15d
loki_image: grafana/loki:3.6.0
loki_port: 3100
otel_collector_image: otel/opentelemetry-collector-contrib:0.153.0
otel_grpc_port: 4317
otel_http_port: 4318
jaeger_image: cr.jaegertracing.io/jaegertracing/jaeger:2.19.0
jaeger_ui_port: 16686
node_exporter_image: prom/node-exporter:latest
cadvisor_image: gcr.io/cadvisor/cadvisor:latest
postgres_exporter_image: prometheuscommunity/postgres-exporter:latest

validation_run_acceptance: false
